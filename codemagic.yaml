workflows:
  ios-unsigned-workflow:
    name: Currency Exchange - iOS (unsigned, for AltStore sideloading)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Add iOS platform files (generated here since it wasn't run locally)
        script: |
          flutter create --platforms=ios --org com.tanush.exchange .
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign
      - name: Package into an unsigned .ipa
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r app-unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/app-unsigned.ipa
    publishing:
      email:
        recipients:
          - tanushgowd32@gmail.com
        notify:
          success: true
          failure: true
